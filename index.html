<!DOCTYPE html>
<html>
<head>

<title>Label Tool Pro</title>
<link rel="icon" href="favicon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*, *::before, *::after{ box-sizing:border-box; }

body{
font-family:Poppins, sans-serif;
margin:0;
padding:20px;
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#2f0130);
color:white;
}

.container{ max-width:650px; margin:auto; }

.card{
background:#1e2633;
border:1px solid rgba(255,255,255,0.15);
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
margin-top:20px;
}

.login-card{
background:#1e2633;
padding:30px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
text-align:center;
width:90%;
max-width:350px;
display:flex;
flex-direction:column;
align-items:center;
}

.login-card input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6a8cff,#721978);
color:white;
font-weight:bold;
cursor:pointer;
}

.normal-heading{ font-size:22px; font-weight:600; }

.gradient-animate{
font-size:26px;
font-weight:700;
background:linear-gradient(90deg,#ff4ecd,#6a8cff,#00d4ff,#ff4ecd);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s linear infinite;
}

@keyframes move{ 0%{background-position:0%} 100%{background-position:300%} }

.datetime{ margin-top:10px; font-size:14px; color:#cbd5e1; }

#dropZone{
height:80px;
border:2px dashed #6a8cff;
padding:30px;
text-align:center;
border-radius:15px;
cursor:pointer;
margin-top:20px;
margin-bottom:10px;
background:#0f172a;
transition:0.3s;
}

#dropZone:hover{ background:#540f43; }
#dropZone.dragover{ background:rgba(0,200,83,0.15); border-color:#00c853; }
#dropZone.uploaded{ background:rgba(255,204,0,0.2); border-color:#ffcc00; }

#status{ margin:0; min-height:16px; color:#94a3b8; font-size:14px; }

#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

#loader div{
border:6px solid #333;
border-top:6px solid #6a8cff;
border-radius:50%;
width:60px;height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{ 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
</style>
</head>

<body>

<div id="loginBox">
  <div class="login-card">
    <h2 class="normal-heading">🔐 Enter Password</h2>
    <input type="password" id="passInput">
    <button class="btn" onclick="checkPassword()">Enter</button>
    <p id="errorMsg" style="color:red;"></p>
  </div>
</div>

<div class="container">

<div class="card">
  <h2 class="gradient-animate" id="greeting"></h2>
  <div class="datetime" id="datetime"></div>
</div>

<div class="card">
  <h2 class="normal-heading">🚀 Label Tool</h2>

  <div id="dropZone">
    <input type="file" id="pdfUpload" accept="application/pdf" hidden>
    <span id="dropText">Click or Drag & Drop PDF</span>
  </div>

  <p id="status"></p>

  <button class="btn" onclick="processPDF()">Print Amazon Labels</button>
  <button class="btn" onclick="processFlipkart()">Print Flipkart Labels</button>
  <button class="btn" onclick="downloadSummary()">Download Summary Excel</button>
</div>

</div>

<div id="loader"><div></div></div>

<script>

// DATE
let d=new Date()
let today=String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getFullYear()).slice(-2)

// PASSWORD
function checkPassword(){
let pass=document.getElementById("passInput").value
if(pass==="1234"){
document.getElementById("loginBox").style.display="none"
}else{
document.getElementById("errorMsg").innerText="Wrong Password"
}
}

// GREETING
function updateGreeting(){
let h=new Date().getHours()
let g=h<12?"🌅 Good Morning":h<17?"☀️ Good Afternoon":h<21?"🌆 Good Evening":"🌙 Good Night"
document.getElementById("greeting").innerText=g
}
updateGreeting()

function updateTime(){
let now=new Date()
document.getElementById("datetime").innerText=
now.toLocaleDateString()+" | "+now.toLocaleTimeString()
}
setInterval(updateTime,1000)

// LOADER
function showLoader(){loader.style.display="flex"}
function hideLoader(){loader.style.display="none"}

let pdfBuffer,summary=[],serial=1,orderNumber=1

// FILE UPLOAD SAME AS BEFORE...

// 🔥 PROCESS PDF (WITH ORDER ID)
async function processPDF(){

const pdf=await pdfjsLib.getDocument({data:pdfBuffer}).promise
const originalPdf=await PDFLib.PDFDocument.load(pdfBuffer)

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)
const text=(await page.getTextContent()).items.map(i=>i.str).join(" ")

let orderIdMatch = text.match(/\d{3}-\d{7}-\d{7}/)
let orderId = orderIdMatch ? orderIdMatch[0] : ""

let sku=[...text.matchAll(/\(\s*([A-Z0-9-]+)\s*\)/g)]
let qty=[...text.matchAll(/₹[\d\.]+\s+(\d+)\s+₹/g)]

for(let k=0;k<sku.length;k++){

let s=sku[k][1]
let q=qty[k]?parseInt(qty[k][1]):1

summary.push({
order:k==0?orderNumber:"",
orderId:orderId,
sno:serial++,
sku:s,
replacement:s,
qty:q,
pcs:q
})
}

orderNumber++
}
}

// 🔥 FINAL EXCEL
function downloadSummary(){

let data=[["Order No","Order ID","S.No","SKU","Replacement","Qty","PCS","Category","Total"]]

const categories=["SQ","BALL","CR","RH","HEART","4COM","3COM","MAT","GLOVES"]

let categoryCount={SQ:0,BALL:0,CR:0,RH:0,HEART:0,"4COM":0,"3COM":0,MAT:0,GLOVES:0}

summary.forEach(r=>{
data.push([r.order,r.orderId,r.sno,r.sku,r.replacement,r.qty,r.pcs])
})

summary.forEach(r=>{

let qty=Number(r.qty)
let reps=r.replacement.toUpperCase().split(",")

reps.forEach(rep=>{

rep=rep.trim()

let match=rep.match(/-(\d+)$/)
let totalPieces=match?parseInt(match[1]):1

let found={}

categories.forEach(cat=>{
let m=rep.match(new RegExp(cat+"(\\d*)"))
if(m){
let w=m[1]?parseInt(m[1]):1
found[cat]=w
}
})

let totalWeight=Object.values(found).reduce((a,b)=>a+b,0)

if(Object.keys(found).length===1){
let c=Object.keys(found)[0]
categoryCount[c]+=qty*totalPieces
}else{
for(let c in found){
categoryCount[c]+=(found[c]/totalWeight)*totalPieces*qty
}
}

})

})

categories.forEach((cat,i)=>{
if(!data[i+1]) data[i+1]=[]
data[i+1][7]=cat
data[i+1][8]=categoryCount[cat]
})

let ws=XLSX.utils.aoa_to_sheet(data)
let wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Summary")
XLSX.writeFile(wb,"Summary.xlsx")
}

</script>

</body>
</html>
