<!DOCTYPE html>
<html>
<head>

<title>Label Tool Pro</title>
<link rel="icon" href="favicon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

/* 🔥 IMPORTANT FIX */
*, *::before, *::after{
box-sizing:border-box;
}

/* BODY */
body{
font-family:Poppins, sans-serif;
margin:0;
padding:20px;
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#2f0130);
color:white;
}

/* CONTAINER */
.container{
max-width:650px;
margin:auto;
}

/* CARD */
.card{
background:#1e2633;
border:1px solid rgb(255, 255,255,0.15);
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
margin-top:20px;
}

/* LOGIN CARD */
.login-card{
background:#1e2633;
padding:30px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
text-align:center;
width:90%;
max-width:350px;
display:flex;
flex-direction:column;
align-items:center;
}

/* INPUT */
.login-card input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

/* BUTTON */
.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6a8cff,#721978);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
opacity:0.85;
}

/* NORMAL HEADING */
.normal-heading{
font-size:22px;
font-weight:600;
color:#ffffff;
}

/* GRADIENT ONLY GREETING */
.gradient-animate{
font-size:26px;
font-weight:700;
background:linear-gradient(90deg,#ff4ecd,#6a8cff,#00d4ff,#ff4ecd);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s linear infinite;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:300%}
}

/* DATE */
.datetime{
margin-top:10px;
font-size:14px;
color:#cbd5e1;
}

/* DROP ZONE */
#dropZone{
height:80px;
border:2px dashed #6a8cff;
padding:30px;
text-align:center;
border-radius:15px;
cursor:pointer;
margin-top:20px;
margin-bottom:10px;
background:#0f172a;
transition:0.3s;
}

#dropZone:hover{
background:#2f0130;
}

#dropZone.dragover{
background: rgba(0, 200, 83, 0.15);
border-color:#00c853;
}

#dropZone.uploaded{
background: rgba(255, 204, 0, 0.2);
border-color:#ffcc00;
}

#status{
margin:0;
min-height:16px;
color:#94a3b8;
font-size:14px;
}

/* LOGIN SCREEN */
#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* LOADER */
#loader{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

#loader div{
border:6px solid #333;
border-top:6px solid #6a8cff;
border-radius:50%;
width:60px;height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* ---------------- HAMBURGER MENU ---------------- */
.menu-icon{
  position: fixed;
  top: 15px;
  left: 15px;
  cursor: pointer;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  width: 30px;
  height: 24px;
  transition: all 0.4s;
}

.menu-icon div{
  width: 100%;
  height: 4px;
  background-color: #fff;
  border-radius: 2px;
  transition: all 0.4s;
}

.menu-icon.active div:nth-child(1){
  transform: rotate(45deg) translate(5px,5px);
}

.menu-icon.active div:nth-child(2){
  opacity: 0;
}

.menu-icon.active div:nth-child(3){
  transform: rotate(-45deg) translate(5px,-5px);
}

.menu{
  height: 100%;
  width: 0;
  position: fixed;
  z-index: 9999;
  top: 0;
  left: 0;
  background-color: rgba(0,0,0,0.95);
  overflow-x: hidden;
  transition: 0.5s;
  padding-top: 60px;
}
.menu a{
  padding: 12px 24px;
  text-decoration: none;
  font-size: 22px;
  color: #fff;
  display: block;
  transition: 0.3s;
}
.menu a:hover{
  background-color: #333;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h2 class="normal-heading">🔐 Enter Password</h2>
    <input type="password" id="passInput" placeholder="Enter password">
    <button class="btn" onclick="checkPassword()">Enter</button>
    <p id="errorMsg" style="color:red;"></p>
  </div>
</div>

<!-- HAMBURGER ICON -->
<div class="menu-icon" onclick="toggleMenu()">
  <div></div>
  <div></div>
  <div></div>
</div>

<!-- SLIDE-IN MENU -->
<div id="myMenu" class="menu">
  <a href="https://github.com/username/button1" target="_blank">Button 1</a>
  <a href="https://github.com/username/button2" target="_blank">Button 2</a>
  <a href="https://github.com/username/button3" target="_blank">Button 3</a>
</div>

<div class="container">

<!-- GREETING -->
<div class="card">
  <h2 class="gradient-animate" id="greeting">Loading...</h2>
  <div class="datetime" id="datetime"></div>
</div>

<!-- TOOL -->
<div class="card">
  <h2 class="normal-heading">🚀 Amazon / Flipkart Label Tool</h2>

  <div id="dropZone">
    <input type="file" id="pdfUpload" accept="application/pdf" hidden>
    <span id="dropText">Click or Drag & Drop PDF</span>
  </div>

  <p id="status"></p>

  <button class="btn" onclick="processPDF()">Print Amazon Labels</button>
  <button class="btn" onclick="processFlipkart()">Print Flipkart Labels</button>
  <button class="btn" onclick="downloadSummary()">Download Summary Excel</button>

</div>

</div>

<!-- LOADER -->
<div id="loader"><div></div></div>

<script>

/* DATE */
let d=new Date()
let today=String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getFullYear()).slice(-2)

/* PASSWORD */
function checkPassword(){
let pass=document.getElementById("passInput").value
if(pass==="1234"){
document.getElementById("loginBox").style.display="none"
}else{
document.getElementById("errorMsg").innerText="Wrong Password"
}
}
document.getElementById("passInput").addEventListener("keydown",e=>{
if(e.key==="Enter")checkPassword()
})

/* GREETING */
function updateGreeting(){
let h=new Date().getHours()
let g=""
if(h<12) g="🔆 Good Morning"
else if(h<17) g="☀️ Good Afternoon"
else if(h<21) g="⛅️ Good Evening"
else g="🌙💤 Good Night"
document.getElementById("greeting").innerText=g
}

/* TIME */
function updateTime(){
let now=new Date()
let day=now.toLocaleDateString('en-IN',{weekday:'long'})
let date=now.toLocaleDateString('en-GB')
let time=now.toLocaleTimeString()
document.getElementById("datetime").innerText=
`${day} | ${date} | ${time}`
}

updateGreeting()
updateTime()
setInterval(updateTime,1000)

/* LOADER */
function showLoader(){document.getElementById("loader").style.display="flex"}
function hideLoader(){document.getElementById("loader").style.display="none"}

/* ---------------- HAMBURGER MENU FUNCTIONS ---------------- */
const menuIcon = document.querySelector(".menu-icon");

function toggleMenu(){
  const menu = document.getElementById("myMenu");
  if(menu.style.width === "250px"){
    menu.style.width = "0";
    menuIcon.classList.remove("active");
  }else{
    menu.style.width = "250px";
    menuIcon.classList.add("active");
  }
}

/* FILE HANDLING, PDF & EXCEL FUNCTIONS SAME AS ORIGINAL */
// (Keep all your existing processPDF, processFlipkart, downloadSummary, loadCSV functions here)

</script>

</body>
</html>
