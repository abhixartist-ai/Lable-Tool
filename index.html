<!DOCTYPE html>
<html>
<head>

<title>Label Tool Pro</title>
<link rel="icon" href="favicon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*, *::before, *::after{box-sizing:border-box;}

body{
font-family:Poppins, sans-serif;
margin:0;
padding:20px;
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#2f0130);
color:white;
}

.container{max-width:650px;margin:auto;}

.card{
background:#1e2633;
border:1px solid rgb(255,255,255,0.15);
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
margin-top:20px;
}

.login-card{
background:#1e2633;
padding:30px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
text-align:center;
width:90%;
max-width:350px;
display:flex;
flex-direction:column;
align-items:center;
}

.login-card input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6a8cff,#721978);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{opacity:0.85;}

.normal-heading{font-size:22px;font-weight:600;color:#fff;}

.gradient-animate{
font-size:26px;
font-weight:700;
background:linear-gradient(90deg,#ff4ecd,#6a8cff,#00d4ff,#ff4ecd);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s linear infinite;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:300%}
}

.datetime{margin-top:10px;font-size:14px;color:#cbd5e1;}

#dropZone{
height:80px;
border:2px dashed #6a8cff;
padding:30px;
text-align:center;
border-radius:15px;
cursor:pointer;
margin-top:20px;
margin-bottom:10px;
background:#0f172a;
transition:0.3s;
}

#dropZone:hover{background:#2f0130;}

#dropZone.dragover{
background: rgba(0,200,83,0.15);
border-color:#00c853;
}

#dropZone.uploaded{
background: rgba(255,204,0,0.2);
border-color:#ffcc00;
}

#status{
margin:0;
min-height:16px;
color:#94a3b8;
font-size:14px;
}

#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

#loader div{
border:6px solid #333;
border-top:6px solid #6a8cff;
border-radius:50%;
width:60px;height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div id="loginBox">
<div class="login-card">
<h2 class="normal-heading">🔐 Enter Password</h2>
<input type="password" id="passInput" placeholder="Enter password">
<button class="btn" onclick="checkPassword()">Enter</button>
<p id="errorMsg" style="color:red;"></p>
</div>
</div>

<div class="container">

<div class="card">
<h2 class="gradient-animate" id="greeting">Loading...</h2>
<div class="datetime" id="datetime"></div>
</div>

<div class="card">
<h2 class="normal-heading">🚀 Amazon / Flipkart Label Tool</h2>

<div id="dropZone">
<input type="file" id="pdfUpload" accept="application/pdf" hidden>
<span id="dropText">Click or Drag & Drop PDF</span>
</div>

<p id="status"></p>

<button class="btn" onclick="processPDF()">Print Amazon Labels</button>
<button class="btn" onclick="processFlipkart()">Print Flipkart Labels</button>
<button class="btn" onclick="downloadSummary()">Download Summary Excel</button>

</div>
</div>

<div id="loader"><div></div></div>

<!-- 🔥 ONLY CHANGED PARTS (बाकी same रहेगा) -->

<script>

/* DATE */
let d=new Date()
let today=String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getFullYear()).slice(-2)

/* GLOBAL */
let pdfBuffer,skuMap={},summary=[],serial=1,orderNumber=1

/* AMAZON */
async function processPDF(){
if(!pdfBuffer){alert("Upload PDF first");return}

showLoader()
summary=[];serial=1;orderNumber=1

const pdf=await pdfjsLib.getDocument({data:pdfBuffer}).promise
const newPdf=await PDFLib.PDFDocument.create()
const originalPdf=await PDFLib.PDFDocument.load(pdfBuffer)

const normalFont=await newPdf.embedFont(PDFLib.StandardFonts.Helvetica)
const boldFont=await newPdf.embedFont(PDFLib.StandardFonts.HelveticaBold)

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)
const text=(await page.getTextContent()).items.map(i=>i.str).join(" ")

// ✅ ORDER ID EXTRACT
let orderIdMatch = text.match(/\d{3}-\d{7}-\d{7}/)
let orderId = orderIdMatch ? orderIdMatch[0] : ""

if(!text.includes("Tax Invoice")){

if(i>=pdf.numPages) continue

const invoice=await pdf.getPage(i+1)
const invText=(await invoice.getTextContent()).items.map(i=>i.str).join(" ")

if(!invText.includes("Tax Invoice")) continue

let sku=[...invText.matchAll(/\(\s*([A-Z0-9]+(?:-[A-Z0-9]+)+)\s*\)/g)]
let qty=[...invText.matchAll(/₹[\d\.]+\s+(\d+)\s+₹/g)]

let items=[]

for(let k=0;k<sku.length;k++){

let s=sku[k][1]
let q=qty[k]?parseInt(qty[k][1]):1

let rep=skuMap[s]||[s]

let pack=0
rep.forEach(r=>{
let m=r.match(/(\d+)$/)
pack+=m?parseInt(m[1]):1
})

let pcs=pack*q

items.push({name:rep.join(", "),qty:q,pcs:pcs})

// ✅ SUMMARY FIXED
summary.push({
order:k==0?orderNumber:"",
orderId: orderId,
sno:serial++,
sku:s,
replacement:rep.join(", "),
qty:q,
pcs:pcs
})

}

orderNumber++

const [p]=await newPdf.copyPages(originalPdf,[i-1])
newPdf.addPage(p)

let pageNew=newPdf.getPages().pop()

for(let j=0;j<items.length;j++){

let y=190-(j*14)

let t1=items[j].name+" ×"+items[j].qty+"      "
let t2="("+items[j].pcs+")"

pageNew.drawText(t1,{x:50,y:y,size:12,font:normalFont})

let width=normalFont.widthOfTextAtSize(t1,12)

pageNew.drawText(t2,{
x:50+width+5,
y:y,
size:12,
font:boldFont
})

}

}
}

let win=window.open(URL.createObjectURL(new Blob([await newPdf.save()],{type:"application/pdf"})))
setTimeout(()=>{win.print()},500)
window.onfocus=function(){hideLoader();window.onfocus=null}
}


/* EXCEL */
function downloadSummary(){

let data = [[
"Order No",
"Order ID",
"S.No",
"SKU",
"Replacement",
"Qty",
"Total PCS",
"Category",
"Total"
]]

// 🔥 CATEGORY LIST
const categories = ["SQ","BALL","CR","RH","HEART","4COM","3COM","MAT","GLOVES"]

// 🔥 COUNT OBJECT
let categoryCount = {
SQ:0, BALL:0, CR:0, RH:0, HEART:0,
"4COM":0, "3COM":0, MAT:0, GLOVES:0
}

// 🔥 NORMAL DATA
summary.forEach(r=>{
data.push([
r.order,
r.orderId,
r.sno,
r.sku,
r.replacement,
r.qty,
r.pcs
])
})

// 🔥 RESET
for(let key in categoryCount){
categoryCount[key] = 0
}

// 🔥 MAIN LOGIC
summary.forEach(r=>{

if(!r.replacement) return

let qty = Number(r.qty)

let reps = r.replacement.toUpperCase().split(",")

reps.forEach(rep=>{

rep = rep.trim()

let match = rep.match(/-(\d+)\s*$/)
let totalPieces = match ? parseInt(match[1]) : 1

let found = {}

// BALL
if(rep.includes("BALL") || rep.includes("FBALL") || rep.includes("BBALL")){
found["BALL"] = 1
}

// OTHERS
categories.forEach(cat=>{

if(cat === "BALL") return

if(cat === "4COM" && rep.includes("4COM")){
found["4COM"] = 1
return
}
if(cat === "3COM" && rep.includes("3COM")){
found["3COM"] = 1
return
}

let m = rep.match(new RegExp(cat + "(\\d*)"))

if(m){
let weight = m[1] ? parseInt(m[1]) : 1
found[cat] = weight
}

})

// APPLY
let totalWeight = Object.values(found).reduce((a,b)=>a+b,0)

if(Object.keys(found).length === 1){
let cat = Object.keys(found)[0]
categoryCount[cat] += qty * totalPieces
}
else if(totalWeight > 0){
for(let cat in found){
let weight = found[cat]
let value = (weight / totalWeight) * totalPieces * qty
categoryCount[cat] += value
}
}

})

})

// ✅ CATEGORY → H, TOTAL → I
categories.forEach((cat,i)=>{
if(!data[i+1]) data[i+1] = []

data[i+1][7] = cat
data[i+1][8] = categoryCount[cat]
})

// EXPORT
let ws = XLSX.utils.aoa_to_sheet(data)
let wb = XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb, ws, "Summary")

XLSX.writeFile(wb, "Amazon_summary_"+today+".xlsx")
}

</script>

</body>
</html>
