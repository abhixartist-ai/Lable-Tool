<!DOCTYPE html>
<html>
<head>

<title>Label Tool Pro</title>
<link rel="icon" href="favicon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*, *::before, *::after{box-sizing:border-box;}

body{
font-family:Poppins,sans-serif;
margin:0;
padding:20px;
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#2f0130);
color:white;
}

.container{max-width:650px;margin:auto;}

.card{
background:#1e2633;
border:1px solid rgba(255,255,255,0.15);
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
margin-top:20px;
}

.login-card{
background:#1e2633;
padding:30px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
text-align:center;
width:90%;
max-width:350px;
display:flex;
flex-direction:column;
align-items:center;
}

.login-card input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6a8cff,#721978);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{opacity:0.85;}

.normal-heading{font-size:22px;font-weight:600;}

.gradient-animate{
font-size:26px;
font-weight:700;
background:linear-gradient(90deg,#ff4ecd,#6a8cff,#00d4ff,#ff4ecd);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s linear infinite;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:300%}
}

.datetime{margin-top:10px;font-size:14px;color:#cbd5e1;}

#dropZone{
height:80px;
border:2px dashed #6a8cff;
padding:30px;
text-align:center;
border-radius:15px;
cursor:pointer;
margin-top:20px;
margin-bottom:10px;
background:#0f172a;
transition:0.3s;
}

#dropZone:hover{background:#540f43;}

#status{
margin:0;
min-height:16px;
color:#94a3b8;
font-size:14px;
}

#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

#loader div{
border:6px solid #333;
border-top:6px solid #6a8cff;
border-radius:50%;
width:60px;height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div id="loginBox">
  <div class="login-card">
    <h2 class="normal-heading">🔐 Enter Password</h2>
    <input type="password" id="passInput" placeholder="Enter password">
    <button class="btn" onclick="checkPassword()">Enter</button>
    <p id="errorMsg" style="color:red;"></p>
  </div>
</div>

<div class="container">

<div class="card">
  <h2 class="gradient-animate" id="greeting"></h2>
  <div class="datetime" id="datetime"></div>
</div>

<div class="card">
  <h2 class="normal-heading">🚀 Amazon / Flipkart Label Tool</h2>

  <div id="dropZone">
    <input type="file" id="pdfUpload" hidden>
    <span id="dropText">Click or Drag & Drop PDF</span>
  </div>

  <p id="status"></p>

  <button class="btn" onclick="processPDF()">Amazon Labels</button>
  <button class="btn" onclick="processFlipkart()">Flipkart Labels</button>
  <button class="btn" onclick="downloadSummary()">Download Excel</button>
</div>

</div>

<div id="loader"><div></div></div>

<script>

// PASSWORD
function checkPassword(){
let pass=document.getElementById("passInput").value;
if(pass==="1234"){
document.getElementById("loginBox").style.display="none";
}else{
document.getElementById("errorMsg").innerText="Wrong Password";
}
}

// ENTER KEY
document.getElementById("passInput").addEventListener("keydown",e=>{
if(e.key==="Enter")checkPassword();
});

// GREETING
function updateGreeting(){
let h=new Date().getHours();
let g="";
if(h<12) g="🔆 Good Morning";
else if(h<17) g="☀️ Good Afternoon";
else if(h<21) g="⛅ Good Evening";
else g="🌙 Good Night";
document.getElementById("greeting").innerText=g;
}

// TIME
function updateTime(){
let now=new Date();
let day=now.toLocaleDateString('en-IN',{weekday:'long'});
let date=now.toLocaleDateString('en-GB');
let time=now.toLocaleTimeString();
document.getElementById("datetime").innerText=`${day} | ${date} | ${time}`;
}

updateGreeting();
updateTime();
setInterval(updateTime,1000);

// FILE
let pdfBuffer=null;
const dropZone=document.getElementById("dropZone");
const fileInput=document.getElementById("pdfUpload");

dropZone.onclick=()=>fileInput.click();

fileInput.onchange=e=>{
let file=e.target.files[0];
if(!file)return;
let reader=new FileReader();
reader.onload=function(){
pdfBuffer=this.result;
document.getElementById("status").innerText="PDF Loaded";
document.getElementById("dropText").innerText="✔ "+file.name;
};
reader.readAsArrayBuffer(file);
};

// EXCEL (FIXED SAFE VERSION)
function downloadSummary(){

let categories=["SQ","BALL","CR","RH","HEART","4COM","3COM","MAT","GLOVES"];

let counts={};
categories.forEach(c=>counts[c]=0);

// DEMO TEST DATA (replace with your real summary if needed)
let summary=[
{replacement:"MAG-HEART2-RH-03",qty:1}
];

summary.forEach(r=>{

let rep=r.replacement.toUpperCase();
let qty=r.qty;

let last=rep.match(/-(\d+)$/);
let total=last?parseInt(last[1]):1;

let found={};

categories.forEach(cat=>{
let safe=cat.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
let m=rep.match(new RegExp(safe+"(\\d*)"));
if(m){
found[cat]=m[1]?parseInt(m[1]):1;
}
});

let sum=Object.values(found).reduce((a,b)=>a+b,0);

if(sum>0){
for(let k in found){
counts[k]+=Math.round((found[k]/sum)*total*qty);
}
}

});

let data=[["Category","Total"]];
categories.forEach(c=>data.push([c,counts[c]]));

let ws=XLSX.utils.aoa_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Summary");

XLSX.writeFile(wb,"summary.xlsx");
}

</script>

</body>
</html>
