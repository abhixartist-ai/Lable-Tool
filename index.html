<!DOCTYPE html>
<html>
<head>

<title>Amazon / Flipkart Label Tool</title>
<link rel="icon" href="favicon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

/* ===== BACKGROUND FIXED ===== */
body{
margin:0;
font-family:Arial;
padding:30px;
min-height:100vh;

background: linear-gradient(
135deg,
#1e1e2f 0%,
#1a1a2e 25%,
#161622 50%,
#12121c 75%,
#0f0f18 100%
);

background-attachment: fixed;
background-repeat: no-repeat;

color:#e4e6eb;
}

/* GLOW */
.bg1,.bg2{
position:fixed;
width:350px;height:350px;
filter:blur(150px);
opacity:0.25;
z-index:-1;
}

.bg1{
top:-120px;left:-120px;
background:#667eea;
}
.bg2{
bottom:-120px;right:-120px;
background:#764ba2;
}

/* SMOOTH OVERLAY */
body::after{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:
radial-gradient(circle at 30% 20%, rgba(255,255,255,0.05), transparent 40%),
radial-gradient(circle at 70% 80%, rgba(255,255,255,0.03), transparent 40%);
pointer-events:none;
}

/* HEADING */
h2{color:#fff;}

/* LOGIN */
#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#12121c;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#passInput{
width:300px;height:45px;
font-size:18px;
border-radius:10px;
border:1px solid #444;
background:#1f1f2e;
color:#fff;
padding:8px;
}

/* DROP ZONE */
#dropZone{
border:2px dashed #667eea;
padding:40px;
text-align:center;
background:rgba(255,255,255,0.05);
margin-top:20px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#dropZone.active{
background:rgba(0,255,150,0.15);
border-color:#00ff99;
}

/* BUTTON */
button{
padding:12px 22px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
border:none;
cursor:pointer;
margin-top:12px;
border-radius:10px;
}

/* LOADER */
#loader{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}
#loader div{
border:6px solid #333;
border-top:6px solid #667eea;
border-radius:50%;
width:60px;height:60px;
animation:spin 1s linear infinite;
}
@keyframes spin{
100%{transform:rotate(360deg);}
}

/* MOBILE */
@media(max-width:600px){
body{padding:15px;}
button{width:100%;}
}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<!-- LOGIN -->
<div id="loginBox">
<h2>Enter Password</h2>
<input type="password" id="passInput">
<button onclick="checkPassword()">Enter</button>
<p id="errorMsg" style="color:red;"></p>
</div>

<h2>🚀 Amazon / Flipkart Label Tool <br>
<span style="font-size:13px;color:#aaa;">New Prospective Industries</span></h2>

<div id="dropZone">
<input type="file" id="pdfUpload" hidden>
<span id="dropText">Click or Drag & Drop PDF</span>
</div>

<br>

<button onclick="processPDF()">Print Amazon Labels</button>
<button onclick="processFlipkart()">Print Flipkart Labels</button>
<button onclick="downloadSummary()">Download Summary Excel</button>

<p id="status"></p>

<div id="loader"><div></div></div>

<script>

/* DATE */
let d=new Date()
let today=String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getFullYear()).slice(-2)

/* PASSWORD */
function checkPassword(){
if(passInput.value==="1234"){
loginBox.style.display="none"
}else errorMsg.innerText="Wrong Password"
}
passInput.addEventListener("keydown",e=>{
if(e.key==="Enter")checkPassword()
})

/* LOADER */
function showLoader(){loader.style.display="flex"}
function hideLoader(){loader.style.display="none"}

let pdfBuffer,summary=[],serial=1

/* FILE */
dropZone.onclick=()=>pdfUpload.click()
pdfUpload.onchange=handleFile

dropZone.ondragover=e=>{e.preventDefault()}
dropZone.ondrop=e=>{
e.preventDefault()
handleFile({target:{files:[e.dataTransfer.files[0]]}})
}

function handleFile(e){
let f=e.target.files[0]
if(!f)return
showLoader()
let r=new FileReader()
r.onload=function(){
pdfBuffer=this.result
dropText.innerText="✔ "+f.name
dropZone.classList.add("active")
hideLoader()
}
r.readAsArrayBuffer(f)
}

/* AMAZON */
async function processPDF(){
if(!pdfBuffer){alert("Upload PDF");return}
showLoader()

const pdf=await pdfjsLib.getDocument({data:pdfBuffer}).promise
const newPdf=await PDFLib.PDFDocument.create()
const original=await PDFLib.PDFDocument.load(pdfBuffer)

for(let i=0;i<pdf.numPages;i++){
const [p]=await newPdf.copyPages(original,[i])
newPdf.addPage(p)
}

let win=window.open(URL.createObjectURL(new Blob([await newPdf.save()])))
setTimeout(()=>win.print(),500)
window.onfocus=()=>{hideLoader();window.onfocus=null}
}

/* FLIPKART */
async function processFlipkart(){
if(!pdfBuffer){alert("Upload PDF");return}
showLoader()

const pdf=await pdfjsLib.getDocument({data:pdfBuffer}).promise
const newPdf=await PDFLib.PDFDocument.create()
const original=await PDFLib.PDFDocument.load(pdfBuffer)

for(let i=0;i<pdf.numPages;i++){
const [p]=await newPdf.copyPages(original,[i])
const {height}=p.getSize()
p.setCropBox(185,height-385,410-185,385-25)
newPdf.addPage(p)
}

let win=window.open(URL.createObjectURL(new Blob([await newPdf.save()])))
setTimeout(()=>win.print(),500)
window.onfocus=()=>{hideLoader();window.onfocus=null}
}

/* EXCEL */
function downloadSummary(){
let data=[["S.No"]]
let ws=XLSX.utils.aoa_to_sheet(data)
let wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Summary")
XLSX.writeFile(wb,"Amazon_summary_"+today+".xlsx")
}

/* SHORTCUT */
document.addEventListener("keydown",e=>{
if(e.ctrlKey&&e.shiftKey&&e.key=="A")processPDF()
if(e.ctrlKey&&e.shiftKey&&e.key=="F")processFlipkart()
if(e.ctrlKey&&e.shiftKey&&e.key=="E")downloadSummary()
})

</script>

</body>
</html>
