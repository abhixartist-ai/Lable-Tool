<!DOCTYPE html>
<html>
<head>

<title>Amazon / Flipkart Label Tool</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

/* ✅ FIXED BACKGROUND */
body{
font-family:Arial;
padding:30px;
margin:0;
min-height:100vh;

background:
radial-gradient(circle at 20% 20%, #667eea22, transparent 40%),
radial-gradient(circle at 80% 80%, #764ba222, transparent 40%),
linear-gradient(135deg,#0f0f1a,#1a1a2e);

background-size:cover;
background-repeat:no-repeat;

color:#e4e6eb;
}

/* GLOW */
.bg1,.bg2{
position:fixed;
width:400px;height:400px;
filter:blur(150px);
opacity:0.25;
z-index:-1;
}
.bg1{top:-120px;left:-120px;background:#667eea;}
.bg2{bottom:-120px;right:-120px;background:#764ba2;}

/* LOGIN */
#loginBox{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#0f0f1a;
display:flex;justify-content:center;align-items:center;
flex-direction:column;z-index:9999;
}

#passInput{
width:300px;height:45px;
font-size:18px;padding:8px;
border-radius:10px;border:1px solid #444;
background:#1f1f2e;color:#fff;
}

/* DROP */
#dropZone{
border:2px dashed #667eea;
padding:40px;text-align:center;
background:rgba(255,255,255,0.05);
margin-top:20px;border-radius:12px;
cursor:pointer;
}

#dropZone.active{
background:rgba(0,255,150,0.15);
}

/* BUTTON */
button{
padding:12px 22px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;border:none;
margin-top:10px;border-radius:10px;
cursor:pointer;
}

/* LOADER */
#loader{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;align-items:center;
z-index:9999;
}
#loader div{
border:6px solid #333;
border-top:6px solid #667eea;
border-radius:50%;
width:60px;height:60px;
animation:spin 1s linear infinite;
}
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<!-- LOGIN -->
<div id="loginBox">
<h2>Enter Password</h2>
<input type="password" id="passInput">
<button onclick="checkPassword()">Enter</button>
<p id="errorMsg" style="color:red;"></p>
</div>

<h2>🚀 Amazon / Flipkart Label Tool<br>
<span style="font-size:13px;color:#aaa;">New Prospective Industries</span>
</h2>

<div id="dropZone">
<input type="file" id="pdfUpload" hidden accept="application/pdf">
<span id="dropText">Click or Drag & Drop PDF Here</span>
</div>

<button onclick="processPDF()">Print Amazon Labels</button>
<button onclick="processFlipkart()">Print Flipkart Labels</button>
<button onclick="downloadSummary()">Download Summary Excel</button>

<p id="status"></p>

<div id="loader"><div></div></div>

<script>

let pdfBuffer, skuMap={}, summary=[], serial=1, orderNumber=1

/* PASSWORD */
function checkPassword(){
if(passInput.value==="1234"){
loginBox.style.display="none"
}else{
errorMsg.innerText="Wrong Password"
}
}
passInput.addEventListener("keydown",e=>{
if(e.key==="Enter")checkPassword()
})

/* LOADER */
function showLoader(){loader.style.display="flex"}
function hideLoader(){loader.style.display="none"}

/* UPLOAD */
dropZone.onclick=()=>pdfUpload.click()

pdfUpload.onchange=e=>handleFile(e.target.files[0])

dropZone.ondrop=e=>{
e.preventDefault()
handleFile(e.dataTransfer.files[0])
}

dropZone.ondragover=e=>e.preventDefault()

function handleFile(file){
if(!file)return
showLoader()

let r=new FileReader()
r.onload=function(){
pdfBuffer=this.result
dropText.innerText="✔ "+file.name
dropZone.classList.add("active")
hideLoader()
}
r.readAsArrayBuffer(file)
}

/* LOAD CSV */
fetch("sku_map.csv")
.then(r=>r.text())
.then(t=>{
t.split("\n").slice(1).forEach(r=>{
let c=r.split(",")
if(c.length>=2){
if(!skuMap[c[0]]) skuMap[c[0]]=[]
skuMap[c[0]].push(c[1])
}
})
})

/* AMAZON FULL WORKING */
async function processPDF(){
if(!pdfBuffer)return alert("Upload PDF")

showLoader()
summary=[];serial=1;orderNumber=1

const pdf=await pdfjsLib.getDocument({data:pdfBuffer}).promise
const newPdf=await PDFLib.PDFDocument.create()
const original=await PDFLib.PDFDocument.load(pdfBuffer)

const normal=await newPdf.embedFont(PDFLib.StandardFonts.Helvetica)
const bold=await newPdf.embedFont(PDFLib.StandardFonts.HelveticaBold)

for(let i=1;i<=pdf.numPages;i++){
const page=await pdf.getPage(i)
const text=(await page.getTextContent()).items.map(i=>i.str).join(" ")

if(!text.includes("Tax Invoice")){
if(i>=pdf.numPages) continue

const invoice=await pdf.getPage(i+1)
const invText=(await invoice.getTextContent()).items.map(i=>i.str).join(" ")

let sku=[...invText.matchAll(/\((.*?)\)/g)]
let qty=[...invText.matchAll(/₹[\d\.]+\s+(\d+)/g)]

let items=[]

for(let k=0;k<sku.length;k++){
let s=sku[k][1]
let q=qty[k]?parseInt(qty[k][1]):1
let rep=skuMap[s]||[s]

let pcs=0
rep.forEach(r=>{
let m=r.match(/(\d+)$/)
pcs+=m?parseInt(m[1]):1
})

pcs*=q

items.push({name:rep.join(", "),qty:q,pcs:pcs})

summary.push([orderNumber,serial++,s,rep.join(","),q,pcs])
}

orderNumber++

const [p]=await newPdf.copyPages(original,[i-1])
newPdf.addPage(p)

let pageNew=newPdf.getPages().pop()

items.forEach((it,j)=>{
let y=180-(j*14)

let t1=it.name+" ×"+it.qty+"      "
let t2="("+it.pcs+")"

pageNew.drawText(t1,{x:50,y:y,size:12,font:normal})

let w=normal.widthOfTextAtSize(t1,12)

pageNew.drawText(t2,{x:50+w+5,y:y,size:12,font:bold})
})
}
}

let win=window.open(URL.createObjectURL(new Blob([await newPdf.save()],{type:"application/pdf"})))
setTimeout(()=>win.print(),500)
window.onfocus=()=>{hideLoader();window.onfocus=null}
}

/* FLIPKART */
async function processFlipkart(){
if(!pdfBuffer)return alert("Upload PDF")

showLoader()

const pdf=await pdfjsLib.getDocument({data:pdfBuffer}).promise
const newPdf=await PDFLib.PDFDocument.create()
const original=await PDFLib.PDFDocument.load(pdfBuffer)

for(let i=0;i<pdf.numPages;i++){
const [p]=await newPdf.copyPages(original,[i])
const {height}=p.getSize()
p.setCropBox(185,height-385,225,360)
newPdf.addPage(p)
}

let win=window.open(URL.createObjectURL(new Blob([await newPdf.save()],{type:"application/pdf"})))
setTimeout(()=>win.print(),500)
window.onfocus=()=>{hideLoader();window.onfocus=null}
}

/* SUMMARY */
function downloadSummary(){
let ws=XLSX.utils.aoa_to_sheet([["Order","Sno","SKU","Replace","Qty","PCS"],...summary])
let wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Summary")
XLSX.writeFile(wb,"Amazon_summary.xlsx")
}

/* SHORTCUTS */
document.addEventListener("keydown",e=>{
if(e.ctrlKey&&e.shiftKey&&e.key.toLowerCase()=="a")processPDF()
if(e.ctrlKey&&e.shiftKey&&e.key.toLowerCase()=="f")processFlipkart()
if(e.ctrlKey&&e.shiftKey&&e.key.toLowerCase()=="e")downloadSummary()
})

</script>

</body>
</html>
