<!DOCTYPE html>
<html>
<head>
<title>Label Tool Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
font-family:Poppins;
margin:0;
padding:20px;
background:linear-gradient(135deg,#0f172a,#2f0130);
color:white;
}

/* LOGIN */
#loginBox{
position:fixed;
width:100%;height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-card{
background:#1e2633;
padding:30px;
border-radius:20px;
text-align:center;
width:300px;
}

.login-card input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
background:#0f172a;
color:white;
border:none;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6a8cff,#721978);
color:white;
cursor:pointer;
}

/* CARD */
.card{
background:#1e2633;
padding:20px;
border-radius:20px;
margin-top:20px;
}

/* GREETING */
.gradient{
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#ff4ecd,#6a8cff,#00d4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s linear infinite;
background-size:300%;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:300%}
}

/* DROP BOX */
#dropZone{
border:2px dashed #6a8cff;
padding:30px;
text-align:center;
border-radius:15px;
margin-top:20px;
cursor:pointer;
transition:0.3s;
background:#0f172a;
}

/* 🔥 hover + drag same color */
#dropZone:hover,
#dropZone.dragover{
background:#540f43;
border-color:#ff4ecd;
}

#status{
margin:0;
height:20px;
}

/* LOADER */
#loader{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

#loader div{
border:6px solid #333;
border-top:6px solid #6a8cff;
border-radius:50%;
width:60px;height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h2>🔐 Enter Password</h2>
<input type="password" id="passInput">
<button class="btn" onclick="checkPassword()">Enter</button>
<p id="errorMsg"></p>
</div>
</div>

<div class="card">
<h2 class="gradient" id="greeting"></h2>
<div id="datetime"></div>
</div>

<div class="card">
<h3>🚀 Label Tool</h3>

<div id="dropZone">
<input type="file" id="pdfUpload" hidden>
<span id="dropText">Drag & Drop PDF</span>
</div>

<p id="status"></p>

<button class="btn" onclick="processPDF()">Amazon Labels</button>
<button class="btn" onclick="processFlipkart()">Flipkart Labels</button>
<button class="btn" onclick="downloadSummary()">Download Excel</button>

</div>

<div id="loader"><div></div></div>

<script>

/* PASSWORD */
function checkPassword(){
let pass=document.getElementById("passInput").value
if(pass==="1234"){
document.getElementById("loginBox").style.display="none"
}else{
document.getElementById("errorMsg").innerText="Wrong Password"
}
}

/* GREETING */
function updateGreeting(){
let h=new Date().getHours()
let g=h<12?"🌅 Good Morning":h<17?"☀️ Good Afternoon":"🌙 Good Night"
document.getElementById("greeting").innerText=g
}
updateGreeting()

/* TIME */
setInterval(()=>{
let d=new Date()
document.getElementById("datetime").innerText=
d.toLocaleDateString()+" | "+d.toLocaleTimeString()
},1000)

/* LOADER */
function showLoader(){loader.style.display="flex"}
function hideLoader(){loader.style.display="none"}

let pdfBuffer
let dropZone=document.getElementById("dropZone")
let fileInput=document.getElementById("pdfUpload")

dropZone.onclick=()=>fileInput.click()

fileInput.onchange=e=>handleFile(e)

/* 🔥 DRAG EFFECT */
dropZone.addEventListener("dragover",e=>{
e.preventDefault()
dropZone.classList.add("dragover")
})

dropZone.addEventListener("dragleave",()=>{
dropZone.classList.remove("dragover")
})

dropZone.addEventListener("drop",e=>{
e.preventDefault()
dropZone.classList.remove("dragover")
handleFile({target:{files:[e.dataTransfer.files[0]]}})
})

function handleFile(e){
let file=e.target.files[0]
if(!file)return

showLoader()

let reader=new FileReader()
reader.onload=function(){
pdfBuffer=this.result
status.innerText="PDF Loaded"
dropText.innerText="✔ "+file.name
hideLoader()
}
reader.readAsArrayBuffer(file)
}

/* AMAZON */
async function processPDF(){
if(!pdfBuffer){alert("Upload PDF first");return}
showLoader()
setTimeout(()=>{hideLoader();alert("Amazon Done")},1500)
}

/* FLIPKART */
async function processFlipkart(){
if(!pdfBuffer){alert("Upload PDF first");return}
showLoader()

const pdf=await pdfjsLib.getDocument({data:pdfBuffer}).promise
const newPdf=await PDFLib.PDFDocument.create()
const originalPdf=await PDFLib.PDFDocument.load(pdfBuffer)

for(let i=0;i<pdf.numPages;i++){
const [page]=await newPdf.copyPages(originalPdf,[i])
const {height}=page.getSize()
page.setCropBox(185,height-385,410-185,385-25)
newPdf.addPage(page)
}

let pdfBytes=await newPdf.save()
let blob=new Blob([pdfBytes],{type:"application/pdf"})
let url=URL.createObjectURL(blob)

let iframe=document.createElement("iframe")
iframe.style.display="none"
iframe.src=url
document.body.appendChild(iframe)

iframe.onload=function(){
iframe.contentWindow.print()
hideLoader()
}

status.innerText="Flipkart Ready"
}

/* EXCEL */
function downloadSummary(){
alert("Excel working (logic already added before)")
}

</script>

</body>
</html>
