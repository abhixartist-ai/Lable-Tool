<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Invoice Extractor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #333;
  text-align: center;
  padding: 30px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  max-width: 500px;
  margin: auto;
}
button {
  padding: 10px 20px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
<body><div class="card">
<h2>Amazon PDF Invoice Extractor</h2>
<input type="file" id="pdfUpload" accept="application/pdf" />
<br><br>
<button onclick="processPDF()">Extract Data</button>
</div><script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

async function processPDF() {
  const file = document.getElementById('pdfUpload').files[0];
  if (!file) return alert('Upload PDF first');

  const reader = new FileReader();
  reader.onload = async function() {
    const typedarray = new Uint8Array(this.result);
    const pdf = await pdfjsLib.getDocument(typedarray).promise;

    let results = [];
    let seenOrders = new Set();

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      let text = content.items.map(item => item.str).join(' ');

      // Fix broken text
      text = text.replace(/\s+/g, ' ');

      // Only process invoice pages
      if (text.toLowerCase().includes('invoice')) {

        // Remove all spaces for safer matching
        let cleanText = text.replace(/\s/g, '');

        // Order ID (Amazon standard)
        let orderMatch = cleanText.match(/\d{3}-\d{7}-\d{7}/);

        // Date formats: dd.mm.yyyy OR dd-mm-yyyy OR dd/mm/yyyy
        let dateMatch = text.match(/(Order Date|Shipping Date|Dispatch Date|Shipped On)?[:\s]*([0-9]{2}[.\-/][0-9]{2}[.\-/][0-9]{4})/);

        let orderId = orderMatch ? orderMatch[0] : '';
        let shipDate = dateMatch ? dateMatch[2] : '';

        // Avoid duplicates + only valid entries
        if (orderId && !seenOrders.has(orderId)) {
          seenOrders.add(orderId);
          results.push({
            "Order ID": orderId,
            "Ship Date": shipDate
          });
        }
      }
    }

    if (results.length === 0) {
      alert("No orders found. Check PDF format.");
      return;
    }

    downloadExcel(results);
  };

  reader.readAsArrayBuffer(file);
}

function downloadExcel(data) {
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Orders");
  XLSX.writeFile(wb, "amazon_orders.xlsx");
}
</script></body>
</html>
